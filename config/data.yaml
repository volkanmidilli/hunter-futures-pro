trading:
  enabled: false
  live_enabled: false
  dry_run: true
  exchange: null
  max_position_size: 0.0

collection:
  enabled: false
  exchange: binance
  market_type: futures
  rate_limit_requests_per_minute: 1200
  symbols:
    - BTCUSDT
    - ETHUSDT
  timeframes:
    - 1h
    - 4h
    - 1d

storage:
  backend: sqlite
  path: data/hunter.db
  raw_data_dir: data/raw
  processed_data_dir: data/processed

logging:
  level: INFO
  format: text
  log_dir: logs
